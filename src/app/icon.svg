<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006650"/>
      <stop offset="100%" stop-color="#001a12"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="10" y1="11" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b2ffe0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="24" y1="25" x2="33" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6DBFA0"/>
      <stop offset="100%" stop-color="#2d7a60"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Noise texture for depth -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Subtle noise overlay for texture -->
  <rect width="40" height="40" rx="10" fill="white" opacity="0.03" filter="url(#noise)"/>

  <!-- Top-left shine -->
  <ellipse cx="10" cy="8" rx="12" ry="7" fill="white" opacity="0.07"/>

  <!-- T crossbar -->
  <rect x="10" y="11" width="20" height="4" rx="2" fill="url(#tGrad)"/>
  <!-- T stem -->
  <rect x="18" y="11" width="4" height="18" rx="2" fill="url(#tGrad)"/>

  <!-- Accent dot bottom-right -->
  <circle cx="29" cy="29" r="5" fill="url(#dotGrad)" filter="url(#glow)"/>
  <path d="M27.2 29L28.4 30.2L30.8 27.8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
