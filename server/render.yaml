services:
  - type: web
    name: taskhub-ws
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://task-hub-io.vercel.app
      - key: NODE_ENV
        value: production
